# GitHub Pages 部署工作流 - 液态玻璃风格 PWA
# 触发条件：推送到 main 分支时自动部署
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 构建阶段：把静态文件整理到 _site 目录并上传为 Pages artifact
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 把纯静态文件复制到 _site 目录，避免把 .github/ 等非网站文件一起上传
      - name: Build static site
        run: |
          mkdir -p _site/icons
          cp index.html app.js data.js style.css sw.js manifest.json .nojekyll _site/
          cp -r icons/* _site/icons/
          ls -la _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
